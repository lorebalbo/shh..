name: SHH
options:
  bundleIdPrefix: com.shh
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

targets:
  SHH:
    type: application
    platform: macOS
    sources:
      - path: SHH
        excludes:
          - "Info.plist"
          - "SHH.entitlements"
          - "SHH-Bridging-Header.h"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shh.voice-utility
        INFOPLIST_FILE: SHH/Info.plist
        CODE_SIGN_ENTITLEMENTS: SHH/SHH.entitlements
        GENERATE_INFOPLIST_FILE: false
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_STYLE: Automatic
        SWIFT_OBJC_BRIDGING_HEADER: SHH/SHH-Bridging-Header.h
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/Vendor/whisper.cpp/lib"
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/Vendor/whisper.cpp/include"
        OTHER_LDFLAGS:
          - "-lwhisper"
          - "-lggml"
          - "-lggml-base"
          - "-lggml-cpu"
          - "-lggml-metal"
          - "-lggml-blas"
          - "-lstdc++"
          - "-framework"
          - "Accelerate"
          - "-framework"
          - "Metal"
          - "-framework"
          - "MetalKit"
          - "-framework"
          - "Foundation"
        OTHER_CFLAGS:
          - "-I$(PROJECT_DIR)/Vendor/whisper.cpp/include"

  SHHTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SHHTests
      - path: SHH/Models
      - path: SHH/Managers/RecordingStateMachine.swift
      - path: SHH/Managers/LLMClient.swift
      - path: SHH/Managers/AnthropicAdapter.swift
      - path: SHH/Managers/TextProcessingPipeline.swift
    dependencies: []
    settings:
      base:
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: true
